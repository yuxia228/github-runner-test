name: Test arm64 runner
run-name: Test arm64_runner
on:
  push:
    branches:
      - '*'
  workflow_dispatch:

jobs:
  Release:
    name: Release
    if: github.repository_owner == 'yuxia228'
    runs-on: ubuntu-22.04-arm
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup build envrionment
        uses: ./.github/workflows/setup_build_env

      - name: Check Disk status
        run: |
          sudo fdisk -l
          df -h
          free -h


